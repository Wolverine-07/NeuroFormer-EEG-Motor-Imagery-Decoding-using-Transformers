# EEG Transformer training configuration
# Subject-dependent evaluation (train + test within each subject)

data:
  data_dir: "./data/physionet"
  subjects: null  # null = all valid subjects
  tmin: 0.0
  tmax: 4.0
  bandpass: [4.0, 40.0]
  resample_freq: 128.0
  test_ratio: 0.2

model:
  name: "eeg_transformer"  # or "eegnet"
  n_channels: 64
  n_classes: 4
  d_model: 128
  num_heads: 4
  d_ff: 256
  num_layers: 4
  dropout: 0.3
  temporal_filters: 16
  temporal_kernel: 64
  patch_size: 16

training:
  batch_size: 32
  num_epochs: 80
  learning_rate: 0.0005
  weight_decay: 0.01
  warmup_epochs: 5
  patience: 15  # early stopping patience
  seed: 42

augmentation:
  enabled: true
  noise_std: 0.1
  noise_prob: 0.5
  time_shift_max: 8
  time_shift_prob: 0.3
  channel_dropout_prob: 0.05
  scale_range: [0.85, 1.15]
